version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_crm
    ports:
      - "5432:5432"
    volumes:
      - erp_crm_pg_data:/var/lib/postgresql/data

volumes:
  erp_crm_pg_data:
